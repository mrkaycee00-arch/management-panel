version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: panel_user
      POSTGRES_PASSWORD: panel_password
      POSTGRES_DB: management_panel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/usr/src/app
    environment:
      - DATABASE_URL=postgresql://panel_user:panel_password@db:5432/management_panel
      - JWT_SECRET=devsecret
    depends_on:
      - db
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/usr/src/app
volumes:
  postgres_data:
